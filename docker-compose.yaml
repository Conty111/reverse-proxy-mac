version: '3.8'
services:
  envoy:
    image: envoyproxy/envoy:v1.36.4
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml
      - ./mac-filter.wasm:/etc/envoy/mac-filter.wasm
      - ./krb5.keytab:/etc/krb5.keytab
    ports:
      - "10000:10000"
      - "9901:9901"
    command: ["-c", "/etc/envoy/envoy.yaml"]