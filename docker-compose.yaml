version: '3.8'

services:
  mac-authserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: mac-authserver:cache
    container_name: mac-authserver
    hostname: mac-authserver
    ports:
      - "9001:9001"
      - "8000:8080"
    volumes:
      - ./config.json:/app/config.json:ro
      # - ./mac-authserver.keytab:/etc/mac-authserver.keytab:ro
      - ./authserver.keytab:/etc/authserver.keytab:ro
      - ./krb5.conf:/etc/krb5.conf:ro
    environment:
      - CONFIG_PATH=/app/config.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    # For tests ONLY
    # (to make reverse dns lookup possible)
    extra_hosts:
    # Source
      - "host-1.ald.company.lan:172.20.0.1"
    # Destination 
      - "host-1.ald.company.lan:172.20.0.2"
      - "host-1.ald.company.lan:172.20.0.3"
      - "host-1.ald.company.lan:172.20.0.4"

  envoy:
    image: envoyproxy/envoy:v1.36.4
    container_name: envoy-proxy
    hostname: envoy
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8080:8080"
      - "9901:9901"
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    restart: unless-stopped

  # Example of how metrics can be pulled and served
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.1
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  proxy-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
