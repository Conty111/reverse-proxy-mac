version: '3.8'

services:
  mac-authserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: mac-authserver:latest
    container_name: mac-authserver
    hostname: mac-authserver
    ports:
      - "9001:9001"
      - "8000:8080"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./mac-authserver.keytab:/etc/mac-authserver.keytab:ro
      - ./krb5.conf:/etc/krb5.conf:ro
    environment:
      - CONFIG_PATH=/app/config.json
    networks:
      - proxy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  envoy:
    image: envoyproxy/envoy:v1.36.4
    container_name: envoy-proxy
    volumes:
      - ./envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "8080:8080"
      - "9901:9901"
    command: ["-c", "/etc/envoy/envoy.yaml", "--log-level", "info"]
    networks:
      - proxy-network
    # depends_on:
    #   mac-authserver:
    #     condition: service_healthy
    restart: unless-stopped

networks:
  proxy-network:
    driver: bridge
