admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
  - name: main
    address:
      socket_address:
        address: 0.0.0.0
        port_value: 8080
    filter_chains:
    - filters:
      # Transport-level (L3/L4) authorization — runs first, before HTTP processing.
      # Envoy sends a CheckRequest with source/destination IP:port (no HTTP data).
      # The transport gRPC server (port 9002) handles these requests via TransportAuthorizer.
      - name: envoy.filters.network.ext_authz
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.ext_authz.v3.ExtAuthz
          grpc_service:
            envoy_grpc:
              cluster_name: transport_ext_authz
            timeout: 5s
          failure_mode_allow: false
          include_peer_certificate: true
          transport_api_version: V3
          stat_prefix: transport_authz

      # HTTP-level authorization — runs after transport check passes.
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: ingress_http
          route_config:
            name: local_route
            virtual_hosts:
            - name: backend
              domains: ["*"]
              routes:
              - match:
                  prefix: "/"
                route:
                  cluster: backend_service
          http_filters:
          - name: envoy.filters.http.ext_authz
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
              grpc_service:
                envoy_grpc:
                  cluster_name: ext_authz
                timeout: 5s
              clear_route_cache: true
              failure_mode_allow: false
              include_peer_certificate: true
              # Pass request headers to ext_authz - by default only some headers are passed
              # We need to explicitly configure to pass all headers including Host
              transport_api_version: V3
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  # Transport-level ext_authz cluster — TransportAuthorizer on port 9002
  - name: transport_ext_authz
    type: STRICT_DNS
    connect_timeout: 1s
    http2_protocol_options: {}
    load_assignment:
      cluster_name: transport_ext_authz
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: mac-authserver
                port_value: 9002

  # HTTP-level ext_authz cluster — HTTPAuthorizer on port 9001
  - name: ext_authz
    type: STRICT_DNS
    connect_timeout: 1s
    http2_protocol_options: {}
    load_assignment:
      cluster_name: ext_authz
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: mac-authserver
                port_value: 9001
  
  - name: backend_service
    type: STRICT_DNS
    connect_timeout: 1s
    load_assignment:
      cluster_name: backend_service
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address:
                address: httpbin.org
                port_value: 80
